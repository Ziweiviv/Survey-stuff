<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Enrichment Zone</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body {
margin: 0;
font-family: system-ui;
background: #0b1220;
color: #e5e7eb;
}

/* TOP BAR */
.topbar {
display: flex;
justify-content: space-between;
align-items: flex-start;
padding: 14px 20px;
background: #0f172a;
border-bottom: 1px solid #1f2937;
}

.brand { font-weight: 700; }

.subtitle {
font-size: 12px;
color: #94a3b8;
}

.small {
color: #94a3b8;
font-size: 0.85rem;
}

/* TOP BUTTONS */
.top-buttons a {
padding: 8px 12px;
margin-left: 8px;
background: #1f2937;
border-radius: 8px;
color: white;
text-decoration: none;
font-size: 13px;
cursor: pointer;
transition: 0.2s;
}

.top-buttons a.active {
background: #22c55e;
color: black;
font-weight: 700;
}

/* LAYOUT */
.container { display: flex; }

/* SIDEBAR */
.sidebar {
width: 220px;
background: #0f172a;
height: calc(100vh - 60px);
padding: 18px;
border-right: 1px solid #1f2937;
}

.side-btn {
display: block;
padding: 10px;
margin-bottom: 8px;
background: #1f2937;
border-radius: 8px;
cursor: pointer;
font-size: 13px;
}

.side-btn.active {
background: #22c55e;
color: black;
font-weight: 600;
}

/* MAIN */
.main {
flex: 1;
padding: 20px;
}

h1 {
font-size: 1.2rem;
margin-bottom: 4px;
}

/* CONTEXT */
.context {
color: #facc15;
font-size: 0.85rem;
font-weight: 600;
margin-bottom: 12px;
}

/* GRID */
.grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 20px;
}

/* CARD */
.card {
background: #111827;
border: 1px solid #1f2937;
border-radius: 14px;
padding: 15px;
height: 340px;
display: flex;
align-items: center;
justify-content: center;
flex-direction: column;
}

canvas {
width: 100% !important;
height: 300px !important;
}

#selectedLabel {
color: #facc15;
font-weight: 700;
margin-bottom: 8px;
text-align: center;
min-height: 18px;
}

/* MOBILE */
@media (max-width: 768px) {

.container {
flex-direction: column;
}

.sidebar {
width: 100%;
min-height: auto;
padding: 12px;
display: flex;
flex-wrap: wrap;
gap: 8px;
}

.side-btn {
flex: 1 1 calc(50% - 8px);
margin-bottom: 0;
text-align: center;
}

.topbar {
flex-direction: column;
align-items: flex-start;
gap: 10px;
}

.top-buttons {
width: 100%;
justify-content: flex-start;
}

.grid {
grid-template-columns: 1fr;
}

.card {
min-height: 280px;
padding: 12px;
}

canvas {
height: 240px !important;
}
}

</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">

<div>
<div class="brand">The Enrichment Zone</div>
<div class="subtitle">Student Success Measurement powered by Vivian</div>
<div class="small">Click a year and question to explore survey insights</div>
</div>

<div class="top-buttons">
<a href="#" onclick="setYear('2025',this)">2025 S1</a>
<a href="#" onclick="setYear('2026',this)">2026 S1</a>
</div>

</div>

<!-- BODY -->
<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">

<!-- NEW OPTIONAL MODE -->
<div class="side-btn active" onclick="setMode('default',this)">Year View</div>
<div class="side-btn" onclick="setMode('programme',this)">Programme View</div>

<hr style="border:1px solid #1f2937; margin:10px 0;">

<!-- QUESTIONS -->
<div class="side-btn active" onclick="setQuestion('Q3',this)">Self efficacy impact</div>
<div class="side-btn" onclick="setQuestion('Q4',this)">Overall support</div>

</div>

<!-- MAIN -->
<div class="main">

<h1 id="title"></h1>

<div id="contextLine" class="context"></div>

<div class="small">UC Enrichment Programme Survey Analysis</div>

<div class="grid">

<div class="card">
<canvas id="mainChart"></canvas>
</div>

<div class="card">

<div id="emptyState" style="color:#94a3b8;text-align:center;">
Click a segment to see programme breakdown
</div>

<div id="selectedLabel"></div>

<canvas id="breakChart" style="display:none;"></canvas>

</div>

</div>

</div>
</div>

<script>

let yearData = {};
let currentYear = "2026";
let currentQ = "Q3";

let viewMode = "default";
let currentProgramme = "tkam";

let mainChart;
let breakChart = null;

const colors = ["#16a34a","#84cc16","#facc15","#fb923c","#ef4444"];

/* LOAD */
async function loadData(){
const res = await fetch("./data.json");
yearData = await res.json();

const defaultYearBtn = document.querySelectorAll(".top-buttons a")[1];
const defaultQBtn = document.querySelectorAll(".sidebar .side-btn")[2];

document.querySelectorAll(".top-buttons a").forEach(b=>b.classList.remove("active"));
document.querySelectorAll(".sidebar .side-btn").forEach(b=>b.classList.remove("active"));

setYear("2026", defaultYearBtn);
setQuestion("Q3", defaultQBtn);

updateContextLine();
renderChart();
}

/* MODE SWITCH */
function setMode(mode, el){

viewMode = mode;

document.querySelectorAll(".sidebar .side-btn").forEach(b=>{
b.classList.remove("active");
});

if(el) el.classList.add("active");

renderChart();
}

/* QUESTION */
function setQuestion(q,el){

currentQ = q;

document.querySelectorAll(".sidebar .side-btn").forEach(b=>{
if(b.innerText.includes("impact") || b.innerText.includes("support")){
b.classList.remove("active");
}
});

if(el) el.classList.add("active");

renderChart();
}

/* LABELS */
function getLabels(){

if(viewMode === "programme"){
return ["2025 S1","2026 S1"];
}

return Object.keys(yearData[currentYear][currentQ]);
}

/* VALUES */
function getValues(){

if(viewMode === "programme"){

const years = ["2025","2026"];

return years.map(y => {

const group = yearData[y][currentQ];

let total = 0;

Object.keys(group).forEach(k => {
const d = group[k];

if(currentProgramme === "tkam") total += d.tkam;
if(currentProgramme === "oi") total += d.oi;
if(currentProgramme === "unilife") total += d.unilife;
});

return total;
});
}

return Object.keys(yearData[currentYear][currentQ]).map(k =>
yearData[currentYear][currentQ][k].oi +
yearData[currentYear][currentQ][k].tkam +
yearData[currentYear][currentQ][k].unilife
);
}

/* CHART */
function renderChart(){

const ctx = document.getElementById("mainChart");

if(mainChart) mainChart.destroy();

const labels = getLabels();

document.getElementById("selectedLabel").innerText = "";

mainChart = new Chart(ctx,{
type:"doughnut",
data:{
labels,
datasets:[{
data:getValues(),
backgroundColor:colors
}]
},
options:{
responsive:true,
maintainAspectRatio:false,
cutout:"65%",
plugins:{
legend:{
position:"bottom"
}
}
}
});
}

/* CONTEXT */
function updateContextLine(){

const yearLabel = currentYear === "2026" ? "2026 S1" : "2025 S1";

const qLabel =
currentQ === "Q3"
? "Self efficacy impact"
: "Overall support";

const modeLabel =
viewMode === "programme"
? "Programme comparison"
: "Year view";

document.getElementById("contextLine").innerText =
`${modeLabel} — ${yearLabel} ${qLabel}`;
}

window.onload = loadData;

</script>

</body>
</html>
