<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Enrichment Zone</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body {
margin: 0;
font-family: system-ui;
background: #0b1220;
color: #e5e7eb;
}

/* TOP BAR */
.topbar {
display: flex;
justify-content: space-between;
align-items: flex-start;
padding: 14px 20px;
background: #0f172a;
border-bottom: 1px solid #1f2937;
}

.brand { font-weight: 700; }

.subtitle {
font-size: 12px;
color: #94a3b8;
}

.small {
color: #94a3b8;
font-size: 0.85rem;
}

/* MODE BANNER */
.mode {
padding: 6px 12px;
margin: 10px 20px;
background: #1f2937;
border-left: 4px solid #22c55e;
border-radius: 6px;
font-size: 13px;
color: #e5e7eb;
}

/* TOP BUTTONS */
.top-buttons a {
padding: 8px 12px;
margin-left: 8px;
background: #1f2937;
border-radius: 8px;
color: white;
text-decoration: none;
font-size: 13px;
cursor: pointer;
transition: 0.2s;
}

.top-buttons a.active {
background: #22c55e;
color: black;
font-weight: 700;
}

/* LAYOUT */
.container { display: flex; }

/* SIDEBAR */
.sidebar {
width: 220px;
background: #0f172a;
height: calc(100vh - 60px);
padding: 18px;
border-right: 1px solid #1f2937;
}

.side-btn {
display: block;
padding: 10px;
margin-bottom: 8px;
background: #1f2937;
border-radius: 8px;
cursor: pointer;
font-size: 13px;
}

.side-btn.active {
background: #22c55e;
color: black;
font-weight: 600;
}

/* MAIN */
.main {
flex: 1;
padding: 20px;
}

.grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 20px;
}

.card {
background: #111827;
border: 1px solid #1f2937;
border-radius: 14px;
padding: 15px;
height: 340px;
display: flex;
align-items: center;
justify-content: center;
flex-direction: column;
}

canvas {
width: 100% !important;
height: 300px !important;
}

/* TABLE */
table {
width: 100%;
margin-top: 20px;
border-collapse: collapse;
background: #111827;
border-radius: 10px;
overflow: hidden;
}

th, td {
padding: 10px;
border-bottom: 1px solid #1f2937;
text-align: left;
font-size: 13px;
}

th {
background: #1f2937;
}

</style>
</head>

<body>

<div class="topbar">
<div>
<div class="brand">The Enrichment Zone</div>
<div class="subtitle">Student Success Measurement powered by Vivian</div>
<div class="small">Click mode → programme or year analysis</div>
</div>

<div class="top-buttons">
<a onclick="toggleMode()" id="modeBtn">Switch to Programme Mode</a>
</div>
</div>

<div id="modeIndicator" class="mode">Mode: Year Analysis</div>

<div class="container">

<div class="sidebar">
<div class="side-btn active" onclick="setQuestion('Q3',this)">Self efficacy impact</div>
<div class="side-btn" onclick="setQuestion('Q4',this)">Overall support</div>
</div>

<div class="main">

<h2 id="title"></h2>
<div id="contextLine"></div>

<div class="grid">

<div class="card">
<canvas id="mainChart"></canvas>
</div>

<div class="card">
<div id="selectedLabel"></div>
<canvas id="breakChart"></canvas>
</div>

</div>

<!-- TABLE -->
<table id="dataTable">
<thead>
<tr>
<th>Programme</th>
<th>Category</th>
<th>OI</th>
<th>TKAM</th>
<th>UniLife</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>
</div>

<script>

let yearData = {};
let currentYear = "2026";
let currentQ = "Q3";
let mode = "year";

let mainChart;
let breakChart;

const colors = ["#16a34a","#84cc16","#facc15"];

async function loadData(){
const res = await fetch("./data.json");
yearData = await res.json();
render();
}

function toggleMode(){
mode = mode === "year" ? "programme" : "year";
document.getElementById("modeIndicator").innerText =
"Mode: " + (mode === "year" ? "Year Analysis" : "Programme Analysis");

document.getElementById("modeBtn").innerText =
mode === "year" ? "Switch to Programme Mode" : "Switch to Year Mode";

render();
}

/* flatten ALL years */
function getAllData(){
let rows = [];
for(const year in yearData){
for(const q in yearData[year]){
for(const cat in yearData[year][q]){
rows.push({
year, q, cat,
...yearData[year][q][cat]
});
}}}
return rows;
}

function render(){

if(mainChart) mainChart.destroy();
if(breakChart) breakChart.destroy();

if(mode === "year") renderYear();
else renderProgramme();
renderTable();
}

function renderYear(){

const labels = Object.keys(yearData[currentYear][currentQ]);

const values = labels.map(l =>
yearData[currentYear][currentQ][l].oi +
yearData[currentYear][currentQ][l].tkam +
yearData[currentYear][currentQ][l].unilife
);

mainChart = new Chart(document.getElementById("mainChart"), {
type:"doughnut",
data:{labels,datasets:[{data:values,backgroundColor:colors}]}
});
}

function renderProgramme(){

const totals = {oi:0,tkam:0,unilife:0};

for(const year in yearData){
for(const q in yearData[year]){
for(const cat in yearData[year][q]){
totals.oi += yearData[year][q][cat].oi;
totals.tkam += yearData[year][q][cat].tkam;
totals.unilife += yearData[year][q][cat].unilife;
}}}

mainChart = new Chart(document.getElementById("mainChart"), {
type:"bar",
data:{
labels:["OI","TKAM","UniLife"],
datasets:[{
data:[totals.oi, totals.tkam, totals.unilife],
backgroundColor:["#ef4444","#3b82f6","#22c55e"]
}]
}
});
}

function renderTable(){
const rows = getAllData();
const tbody = document.querySelector("#dataTable tbody");
tbody.innerHTML = "";

rows.forEach(r=>{
tbody.innerHTML += `
<tr>
<td>${r.cat}</td>
<td>${r.q}</td>
<td>${r.oi}</td>
<td>${r.tkam}</td>
<td>${r.unilife}</td>
</tr>
`;
});
}

function setQuestion(q,el){
currentQ = q;
document.querySelectorAll(".side-btn").forEach(b=>b.classList.remove("active"));
el.classList.add("active");
render();
}

window.onload = loadData;

</script>

</body>
</html>
