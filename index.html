<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Enrichment Zone</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body {
margin: 0;
font-family: system-ui;
background: #0b1220;
color: #e5e7eb;
}

/* TOP BAR */
.topbar {
display: flex;
justify-content: space-between;
align-items: flex-start;
padding: 14px 20px;
background: #0f172a;
border-bottom: 1px solid #1f2937;
}

.brand { font-weight: 700; }

.subtitle {
font-size: 12px;
color: #94a3b8;
}

.small {
color: #94a3b8;
font-size: 0.85rem;
}

/* TOP BUTTONS */
.top-buttons a {
padding: 8px 12px;
margin-left: 8px;
background: #1f2937;
border-radius: 8px;
color: white;
text-decoration: none;
font-size: 13px;
cursor: pointer;
transition: 0.2s;
}

.top-buttons a.active {
background: #22c55e;
color: black;
font-weight: 700;
}

/* LAYOUT */
.container { display: flex; }

/* SIDEBAR */
.sidebar {
width: 220px;
background: #0f172a;
height: calc(100vh - 60px);
padding: 18px;
border-right: 1px solid #1f2937;
}

.side-btn {
display: block;
padding: 10px;
margin-bottom: 8px;
background: #1f2937;
border-radius: 8px;
cursor: pointer;
font-size: 13px;
}

.side-btn.active {
background: #22c55e;
color: black;
font-weight: 600;
}

/* MAIN */
.main {
flex: 1;
padding: 20px;
}

h1 {
font-size: 1.2rem;
margin-bottom: 4px;
}

/* CONTEXT */
.context {
color: #facc15;
font-size: 0.85rem;
font-weight: 600;
margin-bottom: 12px;
}

/* GRID */
.grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 20px;
}

/* CARD */
.card {
background: #111827;
border: 1px solid #1f2937;
border-radius: 14px;
padding: 15px;
height: 340px;
display: flex;
align-items: center;
justify-content: center;
flex-direction: column;
}

canvas {
width: 100% !important;
height: 300px !important;
}

#selectedLabel {
color: #facc15;
font-weight: 700;
margin-bottom: 8px;
text-align: center;
min-height: 18px;
}

/* MOBILE */
/* MOBILE */
@media (max-width: 768px) {

  .container {
    flex-direction: column;
  }

  .topbar {
    flex-direction: column;
    gap: 12px;
    align-items: stretch;
  }

  .top-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    width: 100%;
  }

  .top-buttons a {
    flex: 1 1 calc(50% - 8px);
    margin-left: 0;
    text-align: center;
  }

  .sidebar {
    width: auto;
    height: auto;
    padding: 12px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    border-right: none;
    border-bottom: 1px solid #1f2937;
  }

  .side-btn {
    flex: 1 1 calc(50% - 8px);
    margin-bottom: 0;
    text-align: center;
  }

  .main {
    padding: 15px;
  }

  .grid {
    grid-template-columns: 1fr;
    gap: 15px;
  }

  .card {
    height: auto;
    min-height: 300px;
    padding: 12px;
  }

  canvas {
    height: 250px !important;
  }

  h1 {
    font-size: 1rem;
  }

  .context {
    font-size: 0.8rem;
  }
}

/* EXTRA SMALL PHONES */
@media (max-width: 480px) {

  .top-buttons a,
  .side-btn {
    flex: 1 1 100%;
  }

  .brand {
    font-size: 1rem;
  }

  .subtitle,
  .small {
    font-size: 0.75rem;
  }

  canvas {
    height: 220px !important;
  }
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">

<div>
<div class="brand">Survey Says</div>
<div class="subtitle">Student Success Measurement powered by Vivian</div>
<div class="small">Click a year and question to explore survey insights</div>
</div>

<div class="top-buttons">
<a href="#" onclick="setYear('2025',this)">2025 S1</a>
<a href="#" onclick="setYear('2026',this)">2026 S1</a>
<a href="compt.html">TKAM</a>
<a href="compt.html">Outstanding Impact</a>
<a href="compt.html">UniLife</a>
</div>

</div>

<!-- BODY -->
<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
<div class="side-btn active" onclick="setQuestion('Q3',this)">Self efficacy impact</div>
<div class="side-btn" onclick="setQuestion('Q4',this)">Overall support</div>
</div>

<!-- MAIN -->
<div class="main">

<h1 id="title"></h1>

<div id="contextLine" class="context"></div>

<div class="small">UC Enrichment Programme Survey Analysis</div>

<div class="grid">

<!-- MAIN CHART -->
<div class="card">
<canvas id="mainChart"></canvas>
</div>

<!-- BREAKDOWN -->
<div class="card">

<div id="emptyState" style="color:#94a3b8;text-align:center;">
Click a segment to see programme breakdown
</div>

<div id="selectedLabel"></div>
<div id="breakdownNote"
style="font-size:12px;color:#94a3b8;text-align:center;margin-bottom:8px;">
</div>
<canvas id="breakChart" style="display:none;"></canvas>

</div>

</div>

</div>
</div>

<script>

let yearData = {};
let currentYear = "2026";
let currentQ = "Q3";

let mainChart;
let breakChart = null;

const colors = ["#16a34a","#84cc16","#facc15","#fb923c","#ef4444"];

/* LOAD */
async function loadData(){
const res = await fetch("./data.json");
yearData = await res.json();

/* DEFAULT */
const defaultYearBtn = document.querySelectorAll(".top-buttons a")[1];
const defaultQBtn = document.querySelectorAll(".side-btn")[0];

document.querySelectorAll(".top-buttons a").forEach(b=>b.classList.remove("active"));
document.querySelectorAll(".side-btn").forEach(b=>b.classList.remove("active"));

setYear("2026", defaultYearBtn);
setQuestion("Q3", defaultQBtn);

updateContextLine();
renderChart();
}

/* LABELS */
function getLabels(){
return Object.keys(yearData[currentYear][currentQ]);
}

/* VALUES */
function getValues(){
return getLabels().map(k =>
yearData[currentYear][currentQ][k].oi +
yearData[currentYear][currentQ][k].tkam +
yearData[currentYear][currentQ][k].unilife
);
}

/* MAIN CHART */
function renderChart(){

const ctx = document.getElementById("mainChart");

if(mainChart) mainChart.destroy();

const labels = getLabels();

document.getElementById("selectedLabel").innerText = "";

mainChart = new Chart(ctx,{
type:"doughnut",
data:{
labels,
datasets:[{
data:getValues(),
backgroundColor:colors,
borderWidth:0
}]
},
options:{
responsive:true,
maintainAspectRatio:false,
cutout:"65%",
plugins:{
legend:{
position:"bottom",
labels:{
color:"#e5e7eb",
font:{size:14,weight:"600"},
boxWidth:18,
padding:16
}
}
},
onClick:(e,els)=>{
if(!els.length) return;

const key = labels[els[0].index];
const d = yearData[currentYear][currentQ][key];

document.getElementById("selectedLabel").innerText =
"Selected: " + key;

renderBreakdown(d);
}
}
});
}

/* BREAKDOWN */
function renderBreakdown(d){

document.getElementById("emptyState").style.display="none";
document.getElementById("breakChart").style.display="block";

if(breakChart) breakChart.destroy();

const total = d.tkam + d.oi + d.unilife;

const tkamPct = ((d.tkam / total) * 100).toFixed(1);
const oiPct = ((d.oi / total) * 100).toFixed(1);
const uniPct = ((d.unilife / total) * 100).toFixed(1);

document.getElementById("breakdownNote").innerHTML =
`
TKAM: ${tkamPct}% • Outstanding Impact: ${oiPct}% • UniLife: ${uniPct}%<br>
<span style="font-size:11px">
Share of respondents selecting this response category
</span>
`;

breakChart = new Chart(document.getElementById("breakChart"),{
type:"bar",
data:{
labels:[
"TKAM",
"Outstanding Impact",
"UniLife"
],
datasets:[{
label:"Number of respondents",
data:[
d.tkam,
d.oi,
d.unilife
],
backgroundColor:[
"#ec4899",
"#3b82f6",
"#8b5a2b"
],
borderRadius:8
}]
},
options:{
responsive:true,
maintainAspectRatio:false,
plugins:{
legend:{
display:false
}
},
scales:{
x:{
ticks:{
color:"#e5e7eb"
},
grid:{
display:false
}
},
y:{
beginAtZero:true,
ticks:{
color:"#e5e7eb",
precision:0
},
grid:{
color:"#1f2937"
}
}
}
}
});
}

/* CONTEXT */
function updateContextLine(){

const yearLabel = currentYear === "2026" ? "2026 S1" : "2025 S1";

const qLabel =
currentQ === "Q3"
? "Self efficacy impact"
: "Overall support";

document.getElementById("contextLine").innerText =
`Now showing ${yearLabel} ${qLabel} Programme breakdown`;
}

/* QUESTION */
function setQuestion(q,el){

currentQ = q;

document.getElementById("title").innerText =
currentQ === "Q3"
? "Question: How well does the programme support you in your journey at UC?"
: "Question: How much does the programme help you feel more confident in your ability to succeed at UC?";

document.querySelectorAll(".side-btn").forEach(b=>b.classList.remove("active"));
if(el) el.classList.add("active");

document.getElementById("emptyState").style.display="block";
document.getElementById("breakChart").style.display="none";

document.getElementById("selectedLabel").innerText = "";

updateContextLine();
renderChart();
}

/* YEAR */
function setYear(y,el){

currentYear = y;

document.querySelectorAll(".top-buttons a").forEach(btn=>{
btn.classList.remove("active");
});

if(el) el.classList.add("active");

document.getElementById("selectedLabel").innerText = "";

updateContextLine();
renderChart();
}

window.onload = loadData;

</script>

</body>
</html>
