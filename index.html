<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Enrichment Zone</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body {
margin: 0;
font-family: system-ui;
background: #0b1220;
color: #e5e7eb;
}

/* TOP BAR */
.topbar {
display: flex;
justify-content: space-between;
align-items: flex-start;
padding: 14px 20px;
background: #0f172a;
border-bottom: 1px solid #1f2937;
}

.brand { font-weight: 700; }

.subtitle {
font-size: 12px;
color: #94a3b8;
}

.small {
color: #94a3b8;
font-size: 0.85rem;
}

/* TOP BUTTONS */
.top-buttons a {
padding: 8px 12px;
margin-left: 8px;
background: #1f2937;
border-radius: 8px;
color: white;
text-decoration: none;
font-size: 13px;
cursor: pointer;
transition: 0.2s;
}

.top-buttons a.active {
background: #22c55e;
color: black;
font-weight: 700;
}

/* LAYOUT */
.container { display: flex; }

/* SIDEBAR */
.sidebar {
width: 220px;
background: #0f172a;
height: calc(100vh - 60px);
padding: 18px;
border-right: 1px solid #1f2937;
}

.side-btn {
display: block;
padding: 10px;
margin-bottom: 8px;
background: #1f2937;
border-radius: 8px;
cursor: pointer;
font-size: 13px;
}

.side-btn.active {
background: #22c55e;
color: black;
font-weight: 600;
}

/* MAIN */
.main {
flex: 1;
padding: 20px;
}

h1 {
font-size: 1.2rem;
margin-bottom: 4px;
}

.context {
color: #facc15;
font-size: 0.85rem;
font-weight: 600;
margin-bottom: 12px;
}

.grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 20px;
}

.card {
background: #111827;
border: 1px solid #1f2937;
border-radius: 14px;
padding: 15px;
height: 340px;
display: flex;
align-items: center;
justify-content: center;
flex-direction: column;
}

canvas {
width: 100% !important;
height: 300px !important;
}

#selectedLabel {
color: #facc15;
font-weight: 700;
margin-bottom: 8px;
text-align: center;
min-height: 18px;
}

</style>
</head>

<body>

<div class="topbar">

<div>
<div class="brand">The Enrichment Zone</div>
<div class="subtitle">Student Success Measurement powered by Vivian</div>
<div class="small">Click year or programme (only one active at a time)</div>
</div>

<div class="top-buttons">
<a href="#" onclick="setYear('2025',this)">2025 S1</a>
<a href="#" onclick="setYear('2026',this)">2026 S1</a>
<a href="#" onclick="setProgramme('tkam',this)">TKAM</a>
<a href="#" onclick="setProgramme('oi',this)">Outstanding Impact</a>
<a href="#" onclick="setProgramme('unilife',this)">UniLife</a>
</div>

</div>

<div class="container">

<div class="sidebar">
<div class="side-btn active" onclick="setQuestion('Q3',this)">Self efficacy impact</div>
<div class="side-btn" onclick="setQuestion('Q4',this)">Overall support</div>
</div>

<div class="main">

<h1 id="title"></h1>
<div id="contextLine" class="context"></div>

<div class="grid">

<div class="card">
<canvas id="mainChart"></canvas>
</div>

</div>

</div>
</div>

<script>

let yearData = {};
let currentYear = "2026";
let currentQ = "Q3";
let selectedProgramme = null;

let mainChart;

const colors = ["#16a34a","#84cc16","#facc15","#fb923c","#ef4444"];

async function loadData(){
const res = await fetch("./data.json");
yearData = await res.json();

setYear("2026", document.querySelectorAll(".top-buttons a")[1]);
setQuestion("Q3", document.querySelectorAll(".side-btn")[0]);
renderChart();
updateContext();
}

function getLabels(){
return Object.keys(yearData[currentYear][currentQ]);
}

function getValues(){

// PROGRAMME MODE (ignore year)
if(selectedProgramme){
let vals = [];
for(let y in yearData){
for(let q in yearData[y]){
for(let k in yearData[y][q]){
vals.push(yearData[y][q][k][selectedProgramme]);
}
}
}
return vals;
}

// YEAR MODE
return getLabels().map(k =>
yearData[currentYear][currentQ][k].oi +
yearData[currentYear][currentQ][k].tkam +
yearData[currentYear][currentQ][k].unilife
);
}

function getLabelsDynamic(){

if(selectedProgramme){
let labels = [];
for(let y in yearData){
for(let q in yearData[y]){
for(let k in yearData[y][q]){
labels.push(`${y} ${q} ${k}`);
}
}
}
return labels;
}

return getLabels();
}

function renderChart(){

const ctx = document.getElementById("mainChart");

if(mainChart) mainChart.destroy();

mainChart = new Chart(ctx,{
type:"doughnut",
data:{
labels:getLabelsDynamic(),
datasets:[{
data:getValues(),
backgroundColor:colors,
borderWidth:0
}]
},
options:{
responsive:true,
maintainAspectRatio:false,
cutout:"65%"
}
});
}

function setProgramme(p,el){

selectedProgramme = p;

// clear year highlight
document.querySelectorAll(".top-buttons a").forEach(b=>b.classList.remove("active"));
if(el) el.classList.add("active");

renderChart();
updateContext();
}

function setYear(y,el){

currentYear = y;
selectedProgramme = null; // IMPORTANT: disables programme mode

document.querySelectorAll(".top-buttons a").forEach(b=>b.classList.remove("active"));
if(el) el.classList.add("active");

renderChart();
updateContext();
}

function setQuestion(q,el){
currentQ = q;

document.querySelectorAll(".side-btn").forEach(b=>b.classList.remove("active"));
if(el) el.classList.add("active");

renderChart();
updateContext();
}

function updateContext(){
document.getElementById("contextLine").innerText =
selectedProgramme
? `Programme view: ${selectedProgramme.toUpperCase()} (all years)`
: `Year view: ${currentYear} | Question ${currentQ}`;
}

window.onload = loadData;

</script>

</body>
</html>
