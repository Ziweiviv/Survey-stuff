<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Enrichment Zone</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body {
margin: 0;
font-family: system-ui;
background: #0b1220;
color: #e5e7eb;
}

/* TOP BAR */
.topbar {
display: flex;
justify-content: space-between;
align-items: flex-start;
padding: 14px 20px;
background: #0f172a;
border-bottom: 1px solid #1f2937;
}

.brand { font-weight: 700; }

.subtitle {
font-size: 12px;
color: #94a3b8;
}

.small {
color: #94a3b8;
font-size: 0.85rem;
}

/* TOP BUTTONS */
.top-buttons a {
padding: 8px 12px;
margin-left: 8px;
background: #1f2937;
border-radius: 8px;
color: white;
text-decoration: none;
font-size: 13px;
cursor: pointer;
transition: 0.2s;
}

.top-buttons a.active {
background: #22c55e;
color: black;
font-weight: 700;
}

/* LAYOUT */
.container { display: flex; }

/* SIDEBAR */
.sidebar {
width: 220px;
background: #0f172a;
height: calc(100vh - 60px);
padding: 18px;
border-right: 1px solid #1f2937;
}

.side-btn {
display: block;
padding: 10px;
margin-bottom: 8px;
background: #1f2937;
border-radius: 8px;
cursor: pointer;
font-size: 13px;
}

.side-btn.active {
background: #22c55e;
color: black;
font-weight: 600;
}

/* MAIN */
.main {
flex: 1;
padding: 20px;
}

h1 {
font-size: 1.2rem;
margin-bottom: 4px;
}

/* CONTEXT */
.context {
color: #facc15;
font-size: 0.85rem;
font-weight: 600;
margin-bottom: 12px;
}

/* GRID */
.grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 20px;
}

/* CARD */
.card {
background: #111827;
border: 1px solid #1f2937;
border-radius: 14px;
padding: 15px;
height: 340px;
display: flex;
align-items: center;
justify-content: center;
flex-direction: column;
}

canvas {
width: 100% !important;
height: 300px !important;
}

#selectedLabel {
color: #facc15;
font-weight: 700;
margin-bottom: 8px;
text-align: center;
min-height: 18px;
}

/* MOBILE */
@media (max-width: 768px) {

.container {
flex-direction: column;
}

.sidebar {
width: 100%;
min-height: auto;
padding: 12px;
display: flex;
flex-wrap: wrap;
gap: 8px;
}

.side-btn {
flex: 1 1 calc(50% - 8px);
margin-bottom: 0;
text-align: center;
}

.topbar {
flex-direction: column;
align-items: flex-start;
gap: 10px;
}

.top-buttons {
width: 100%;
justify-content: flex-start;
}

.grid {
grid-template-columns: 1fr;
}

.card {
min-height: 280px;
padding: 12px;
}

canvas {
height: 240px !important;
}
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">

<div>
<div class="brand">The Enrichment Zone</div>
<div class="subtitle">Student Success Measurement powered by Vivian</div>
<div class="small">Click a year and question to explore survey insights</div>
</div>

<div class="top-buttons">
<a href="#" onclick="setYear('2025',this)">2025 S1</a>
<a href="#" onclick="setYear('2026',this)">2026 S1</a>
<a href="#" onclick="setProgramme('tkam',this)">TKAM</a>
<a href="#" onclick="setProgramme('oi',this)">Outstanding Impact</a>
<a href="#" onclick="setProgramme('unilife',this)">UniLife</a>
</div>

</div>

<!-- BODY -->
<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
<div class="side-btn active" onclick="setQuestion('Q3',this)">Self efficacy impact</div>
<div class="side-btn" onclick="setQuestion('Q4',this)">Overall support</div>
</div>

<!-- MAIN -->
<div class="main">

<h1 id="title"></h1>

<div id="contextLine" class="context"></div>

<div class="small">UC Enrichment Programme Survey Analysis</div>

<div class="grid">

<!-- MAIN CHART -->
<div class="card">
<canvas id="mainChart"></canvas>
</div>

<!-- BREAKDOWN -->
<div class="card">

<div id="emptyState" style="color:#94a3b8;text-align:center;">
Click a segment to see programme breakdown
</div>

<div id="selectedLabel"></div>

<canvas id="breakChart" style="display:none;"></canvas>

</div>

</div>

</div>
</div>

<script>

let yearData = {};
let currentYear = "2026";
let currentQ = "Q3";

let mainChart;

const colors = ["#16a34a","#3b82f6","#facc15"];

/* LOAD DATA */
async function loadData(){
const res = await fetch("./data.json");
yearData = await res.json();

setYear("2026", document.querySelectorAll(".top-buttons a")[1]);
setQuestion("Q3", document.querySelectorAll(".side-btn")[0]);

updateContextLine();
renderChart();
}

/* CORE DATA BUILD */
function buildProgrammeTotals(){

const programmes = {
tkam: 0,
oi: 0,
unilife: 0
};

const data = yearData[currentYear][currentQ];

for(let response in data){
programmes.tkam += data[response].tkam;
programmes.oi += data[response].oi;
programmes.unilife += data[response].unilife;
}

return {
labels: ["TKAM", "Outstanding Impact", "UniLife"],
values: [programmes.tkam, programmes.oi, programmes.unilife]
};
}

/* RENDER CHART */
function renderChart(){

const ctx = document.getElementById("mainChart");

if(mainChart) mainChart.destroy();

const chartData = buildProgrammeTotals();

mainChart = new Chart(ctx,{
type:"bar",
data:{
labels: chartData.labels,
datasets:[{
data: chartData.values,
backgroundColor: colors,
borderWidth: 0
}]
},
options:{
responsive:true,
maintainAspectRatio:false,
plugins:{
legend:{ display:false }
},
scales:{
y:{
beginAtZero:true
}
}
}
});
}

/* CONTEXT TEXT */
function updateContextLine(){

const yearLabel = currentYear === "2026" ? "2026 S1" : "2025 S1";

const qLabel =
currentQ === "Q3"
? "Self efficacy impact"
: "Overall support";

document.getElementById("contextLine").innerText =
`${yearLabel} | ${qLabel} | Programme comparison`;
}

/* YEAR SELECT */
function setYear(y,el){
currentYear = y;

document.querySelectorAll(".top-buttons a").forEach(b=>b.classList.remove("active"));
if(el) el.classList.add("active");

renderChart();
updateContextLine();
}

/* QUESTION SELECT */
function setQuestion(q,el){
currentQ = q;

document.querySelectorAll(".side-btn").forEach(b=>b.classList.remove("active"));
if(el) el.classList.add("active");

renderChart();
updateContextLine();
}

window.onload = loadData;

</script>
</body>
</html>
